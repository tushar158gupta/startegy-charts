<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backtest Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d0d14;color:#d0d0d8;min-height:100vh}

.wrap{max-width:1080px;margin:0 auto;padding:36px 28px 64px}

/* ── Home ── */
.pg-title{font-size:1.45rem;font-weight:700;color:#f2f2f2;margin-bottom:4px}
.pg-sub{color:#888;font-size:.78rem;display:block;margin-bottom:32px}

.group{margin-bottom:36px}
.group-label{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:#aaa;
  display:flex;align-items:center;gap:10px;margin-bottom:12px}
.group-label::after{content:'';flex:1;height:1px;background:#22222e}
.cmp-btn{margin-left:10px;font-size:.65rem;font-weight:600;color:#5599ee;text-decoration:none;
  background:#0e1e34;border:1px solid #1e3a60;border-radius:5px;padding:2px 10px;
  text-transform:none;letter-spacing:0;white-space:nowrap;transition:background .15s,color .15s}
.cmp-btn:hover{background:#162840;color:#88bbff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

.card{background:#13131e;border:1px solid #22222e;border-radius:10px;padding:16px 18px;
  cursor:pointer;display:flex;flex-direction:column;user-select:none;
  transition:border-color .15s,background .15s}
.card:hover{border-color:#3a5a9a;background:#15152a}

.chead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.cname{font-size:.95rem;font-weight:700;color:#eeeef4}
.vbadge{background:#1a1a38;border:1px solid #2a2a58;color:#7a9aff;font-size:.65rem;
  padding:2px 8px;border-radius:6px;font-weight:600;letter-spacing:.03em}

.cdesc{color:#9a9aaa;font-size:.73rem;margin-bottom:12px;line-height:1.5}

.cstats{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid #22222e;border-radius:7px;overflow:hidden}
.cs{padding:9px 6px;text-align:center;border-right:1px solid #22222e}
.cs:last-child{border-right:none}
.cv{font-size:.95rem;font-weight:700;color:#d8d8e4}
.cv.g{color:#22dd66}.cv.y{color:#ffbb00}.cv.r{color:#ff5555}
.cl{font-size:.6rem;color:#888;margin-top:3px;text-transform:uppercase;letter-spacing:.05em}

.cnotes{color:#999;font-size:.68rem;margin-top:10px;padding-top:9px;
  border-top:1px solid #1e1e2a;line-height:1.5}

/* ── Detail ── */
#screen-detail{display:none;max-width:940px;margin:0 auto;padding:28px 28px 64px}

.back-btn{background:none;border:none;color:#5599ee;cursor:pointer;font-size:.82rem;
  padding:0;margin-bottom:20px;display:inline-flex;align-items:center;gap:4px}
.back-btn:hover{color:#88bbff}

.dcard{background:#13131e;border:1px solid #22222e;border-radius:12px;padding:22px 24px;margin-bottom:14px}
.dcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.dhead h1{font-size:1.3rem;color:#f2f2f2;font-weight:700;display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap}
.ddesc{color:#aaa;margin-top:10px;font-size:.8rem;line-height:1.55}
.dnotes{color:#66aaff;margin-top:10px;font-size:.77rem;background:#0a1020;
  border:1px solid #18304a;border-radius:6px;padding:6px 12px;display:inline-block}
.drange{color:#888;font-size:.71rem;margin-top:10px;display:flex;align-items:center;gap:5px}
.drange span{color:#aaa}

.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.sbar{flex:1;min-width:76px;background:#13131e;border:1px solid #22222e;border-radius:8px;padding:12px 8px;text-align:center}
.sbar .sv{font-size:1.35rem;font-weight:700;line-height:1;color:#d8d8e4}
.sbar .sl2{font-size:.58rem;color:#888;margin-top:5px;text-transform:uppercase;letter-spacing:.07em}

.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-bottom:28px}
.info-section{background:#13131e;border:1px solid #1e1e2c;border-radius:9px;overflow:hidden}
.info-title{background:#0e0e1a;color:#7a9aff;font-size:.61rem;font-weight:700;
  letter-spacing:.11em;text-transform:uppercase;padding:8px 14px;border-bottom:1px solid #1e1e2c}
.info-rows{padding:2px 0}
.info-row{display:flex;justify-content:space-between;align-items:baseline;
  padding:6px 14px;gap:14px;border-bottom:1px solid rgba(255,255,255,.04)}
.info-row:last-child{border-bottom:none}
.ik{color:#999;font-size:.72rem;white-space:nowrap;flex-shrink:0}
.iv{color:#ccc;font-size:.77rem;text-align:right}

.cta-btn{display:inline-flex;align-items:center;gap:6px;background:#0e1e34;
  border:1px solid #1e3a60;color:#5599ee;padding:9px 18px;border-radius:8px;
  text-decoration:none;font-size:.83rem;font-weight:600;white-space:nowrap;flex-shrink:0;
  transition:background .15s,border-color .15s}
.cta-btn:hover{background:#162840;border-color:#3a6aaa;color:#88bbff}
.cta-btn.disabled{opacity:.3;pointer-events:none}
</style>
</head>
<body>

<!-- ── Home ── -->
<div id="screen-home">
  <div class="wrap">
    <h1 class="pg-title">Backtest Dashboard</h1>
    <span class="pg-sub" id="pg-sub"></span>
    <div id="groups-container"></div>
  </div>
</div>

<!-- ── Detail ── -->
<div id="screen-detail">
  <button class="back-btn" onclick="goHome()">&#8592; Back to Dashboard</button>
  <div class="dcard">
    <div class="dcard-top">
      <div id="d-head" class="dhead"></div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0">
        <a id="d-cta" class="cta-btn" href="#">View Stocks &#8594;</a>
        <a id="d-cmp" class="cta-btn" href="#" style="display:none;font-size:.76rem;padding:7px 14px;background:#0a180f;border-color:#122a18;color:#44aa66">Compare Versions</a>
      </div>
    </div>
  </div>
  <div id="d-stats" class="stats-bar"></div>
  <div id="d-body"></div>
</div>

// ── Render home grouped by strategy ──────────────────────────────────────────
(function renderHome() {
  var order = [], seen = {};
  CARDS.forEach(function(c) { if (!seen[c.stratLabel]) { seen[c.stratLabel] = true; order.push(c.stratLabel); } });

  var container = document.getElementById('groups-container');
  order.forEach(function(label) {
    var items = CARDS.map(function(c,i){return{c:c,i:i};}).filter(function(x){return x.c.stratLabel===label;});
    var groupEl = document.createElement('div');
    groupEl.className = 'group';
    var gridId = 'g-' + label.replace(/\s+/g,'');
    var cmpBtn = items.length > 1
      ? '<a href="compare.html?s=' + encodeURIComponent(label) + '" class="cmp-btn">Compare Versions</a>'
      : '';
    groupEl.innerHTML = '<div class="group-label">' + label + ' <span style="color:#555;font-weight:400;text-transform:none;letter-spacing:0;font-size:.7rem">— ' + items.length + ' version' + (items.length>1?'s':'') + '</span>' + cmpBtn + '</div><div class="grid" id="' + gridId + '"></div>';
    container.appendChild(groupEl);

    var grid = document.getElementById(gridId);
    items.forEach(function(item) {
      var c = item.c, i = item.i;
      var wrf = parseFloat(c.wr);
      var wrcls = wrf >= 60 ? 'g' : wrf >= 50 ? 'y' : 'r';
      var div = document.createElement('div');
      div.className = 'card';
      div.onclick = function(){ openCard(i); };
      div.innerHTML =
        '<div class="chead"><span class="cname">' + c.stratLabel + '</span><span class="vbadge">' + c.version + '</span></div>' +
        '<div class="cdesc">' + (c.description||'') + '</div>' +
        '<div class="cstats">' +
          '<div class="cs"><div class="cv">' + c.total + '</div><div class="cl">Signals</div></div>' +
          '<div class="cs"><div class="cv">' + c.symCount + '</div><div class="cl">Symbols</div></div>' +
          '<div class="cs"><div class="cv ' + wrcls + '">' + c.wr + '%</div><div class="cl">Win Rate</div></div>' +
        '</div>' +
        (c.notes ? '<div class="cnotes">' + c.notes + '</div>' : '');
      grid.appendChild(div);
    });
  });

  document.getElementById('pg-sub').textContent =
    'Click a strategy to see details · ' + CARDS.length + ' versions · ' + order.length + ' strategies';
}());

// ── Navigation ────────────────────────────────────────────────────────────────
function goHome() {
  document.getElementById('screen-detail').style.display = 'none';
  document.getElementById('screen-home').style.display   = '';
  window.scrollTo(0,0);
}

function openCard(i) {
  var c = CARDS[i];
  document.getElementById('screen-home').style.display   = 'none';
  document.getElementById('screen-detail').style.display = 'block';
  window.scrollTo(0,0);

  var badge = c.version ? '<span class="vbadge">' + c.version + '</span>' : '';
  document.getElementById('d-head').innerHTML =
    '<h1>' + c.stratLabel + ' ' + badge + '</h1>' +
    (c.description ? '<div class="ddesc">' + c.description + '</div>' : '') +
    (c.notes       ? '<div class="dnotes">' + c.notes + '</div>' : '') +
    (c.fromDate    ? '<div class="drange"><span>' + c.fromDate + '</span> &rarr; <span>' + c.toDate + '</span></div>' : '');

  var wrf  = parseFloat(c.wr);
  var wrc  = wrf >= 60 ? '#00c853' : wrf >= 50 ? '#ffb300' : '#ef5350';
  var wrbg = wrf >= 60 ? '#041209' : wrf >= 50 ? '#130e00' : '#130404';
  var open = c.total - c.wins - c.sl;
  document.getElementById('d-stats').innerHTML =
    sbar(c.total,    'Signals') +
    sbar(c.symCount, 'Symbols') +
    '<div class="sbar"><div class="sv" style="color:' + wrc + ';background:' + wrbg + ';padding:3px 12px;border-radius:6px;font-size:1.25rem">' + c.wr + '%</div><div class="sl2">Win Rate</div></div>' +
    sbar(c.wins, 'Wins',    '#00c853') +
    sbar(c.sl,   'SL Hits', '#ef5350') +
    (open > 0 ? sbar(open, 'Open', '#666') : '');

  document.getElementById('d-body').innerHTML =
    c.config ? renderConfig(c.config) : '<p style="color:#333;padding:16px 0">No config available</p>';

  var cta = document.getElementById('d-cta');
  if (c.hasCharts) {
    cta.href = c.folder + '/index.html';
    cta.textContent = 'View Stocks →';
    cta.classList.remove('disabled');
  } else {
    cta.href = '#';
    cta.textContent = 'Charts not generated yet';
    cta.classList.add('disabled');
  }

  var siblings = CARDS.filter(function(x){ return x.stratLabel === c.stratLabel; });
  var cmpBtn = document.getElementById('d-cmp');
  if (siblings.length > 1) {
    cmpBtn.href = 'compare.html?s=' + encodeURIComponent(c.stratLabel);
    cmpBtn.style.display = 'inline-flex';
  } else {
    cmpBtn.style.display = 'none';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function sbar(v, label, col) {
  return '<div class="sbar"><div class="sv"' + (col ? ' style="color:' + col + '"' : '') + '>' + v + '</div><div class="sl2">' + label + '</div></div>';
}
function row(k, v) {
  return '<div class="info-row"><span class="ik">' + k + '</span><span class="iv">' + v + '</span></div>';
}
function section(title, rows) {
  if (!rows.length) return '';
  return '<div class="info-section"><div class="info-title">' + title + '</div><div class="info-rows">' + rows.join('') + '</div></div>';
}

function renderConfig(cfg) {
  var sections = [];

  var r1 = [];
  if (cfg.TIMEFRAMES && cfg.TIMEFRAMES.length)
    r1.push(row('Timeframes', cfg.TIMEFRAMES.map(function(t){ return t.replace('minute',' min'); }).join(' · ')));
  var mode = 'PENDING + CONFIRMED';
  if (cfg.SKIP_CONFIRMED === true)    mode = 'PENDING only — buy-stop above C3 high';
  else if (cfg.REQUIRE_BULLISH_ENTRY) mode = 'CONFIRMED — entry at open of bullish C3';
  r1.push(row('Signal mode', mode));
  if (cfg.ENTRY_RULE !== undefined) r1.push(row('Entry level', cfg.ENTRY_RULE));
  if (cfg.SL_RULE    !== undefined) r1.push(row('SL rule',     cfg.SL_RULE));
  if (cfg.BREAKOUT_BUFFER_PCT !== undefined) r1.push(row('Breakout buffer', cfg.BREAKOUT_BUFFER_PCT + '%'));
  if (cfg.EOD_CUTOFF_HOUR) r1.push(row('EOD cutoff', 'No new signals after ' + cfg.EOD_CUTOFF_HOUR + ':00'));
  sections.push(section('Entry', r1));

  var r2 = [];
  if (cfg.SL_BUFFER_PCT !== undefined) r2.push(row('SL buffer', cfg.SL_BUFFER_PCT + '% of range below pattern low'));
  if (cfg.MIN_RISK_PCT  !== undefined) r2.push(row('Min risk',  cfg.MIN_RISK_PCT  + '% per trade'));
  if (cfg.MAX_RISK_PCT  !== undefined) r2.push(row('Max risk',  cfg.MAX_RISK_PCT  + '% per trade'));
  sections.push(section('Stop Loss', r2));

  var r3 = [];
  if (cfg.T1_RR) r3.push(row('T1', cfg.T1_RR + 'R'));
  if (cfg.T2_RR) r3.push(row('T2', cfg.T2_RR + 'R'));
  if (cfg.T3_RR) r3.push(row('T3', cfg.T3_RR + 'R'));
  if (cfg.TRAILING_ACTIVATION_RR) r3.push(row('Trailing activates', 'after ' + cfg.TRAILING_ACTIVATION_RR + 'R'));
  if (cfg.TRAILING_STOP_PCT)      r3.push(row('Trailing step', cfg.TRAILING_STOP_PCT + '%'));
  if (cfg.PARTIAL_BOOKING_PCT && cfg.PARTIAL_BOOKING_RR)
    r3.push(row('Partial exit', cfg.PARTIAL_BOOKING_PCT + '% of position at ' + cfg.PARTIAL_BOOKING_RR + 'R'));
  if (cfg.MIN_RR_RATIO) r3.push(row('Min R:R to accept trade', cfg.MIN_RR_RATIO + 'R'));
  if (cfg.TRADE_PARAMS) {
    Object.keys(cfg.TRADE_PARAMS).forEach(function(tf) {
      var p   = cfg.TRADE_PARAMS[tf];
      var lbl = tf.replace('minute',' min');
      var tgts = [
        ('t1R' in p) && ('T1=' + p.t1R + 'R'),
        ('t2R' in p) && ('T2=' + p.t2R + 'R'),
        ('t3R' in p) && ('T3=' + p.t3R + 'R'),
      ].filter(Boolean).join(' · ');
      r3.push(row(lbl,
        tgts +
        (p.maxHoldCandles ? ' · max ' + p.maxHoldCandles + ' candles' : '') +
        (p.slBuffer ? ' · SL buf ' + (p.slBuffer * 100) + '%' : '')
      ));
    });
  }
  sections.push(section('Targets', r3));

  var r4 = [];
  if (cfg.RSI_MIN !== undefined && cfg.RSI_MAX !== undefined)
    r4.push(row('RSI', cfg.RSI_MIN + ' – ' + cfg.RSI_MAX + ' (period ' + cfg.RSI_PERIOD + ')'));
  if (cfg.ADX_THRESHOLD !== undefined) {
    var adxStr = cfg.ADX_MAX !== undefined
      ? cfg.ADX_THRESHOLD + ' – ' + cfg.ADX_MAX
      : '≥ ' + cfg.ADX_THRESHOLD;
    r4.push(row('ADX', adxStr + ' (period ' + cfg.ADX_PERIOD + ')'));
  }
  if (cfg.ATR_MIN_THRESHOLD_PCT !== undefined) r4.push(row('ATR min', cfg.ATR_MIN_THRESHOLD_PCT + '% of price'));
  if (cfg.SUPPORT_ZONE_PCT !== undefined) r4.push(row('Support zone', '±' + cfg.SUPPORT_ZONE_PCT + '% around swing low'));
  if (cfg.VOLUME_MA_PERIOD !== undefined) r4.push(row('Volume MA', cfg.VOLUME_MA_PERIOD + '-candle average'));
  if (cfg.MIN_VOLUME_MULTIPLE)            r4.push(row('Volume filter', '≥ ' + cfg.MIN_VOLUME_MULTIPLE + '× average'));
  if (cfg.SWING_LOOKBACK !== undefined)   r4.push(row('Swing lookback', cfg.SWING_LOOKBACK + ' candles'));
  if (cfg.TREND_LOOKBACK !== undefined && !cfg.DECLINE_BY_INTERVAL)
    r4.push(row('Trend lookback', cfg.TREND_LOOKBACK + ' candles'));
  if (cfg.DECLINE_BY_INTERVAL) {
    Object.keys(cfg.DECLINE_BY_INTERVAL).forEach(function(tf) {
      r4.push(row(
        'Prior decline (' + tf.replace('minute',' min') + ')',
        '≥ ' + cfg.DECLINE_BY_INTERVAL[tf] + '% over ' + cfg.TREND_LOOKBACK + ' candles'
      ));
    });
  }
  sections.push(section('Filters', r4));

  var r5 = [];
  if (cfg.LOW_TOLERANCE_PCT !== undefined)
    r5.push(row('Low tolerance', cfg.LOW_TOLERANCE_PCT + '% (how equal the two lows must be)'));
  if (cfg.STRONG_BODY_RATIO !== undefined)
    r5.push(row('Strong body', '≥ ' + (cfg.STRONG_BODY_RATIO * 100) + '% of candle range'));
  if (cfg.NORMAL_BODY_MIN_RATIO !== undefined)
    r5.push(row('Normal body min', '≥ ' + (cfg.NORMAL_BODY_MIN_RATIO * 100) + '% of range'));
  if (cfg.MIN_CANDLE_RANGE_PCT !== undefined)
    r5.push(row('Min candle size', cfg.MIN_CANDLE_RANGE_PCT + '% of price'));
  if (cfg.REQUIRE_STRONG_C1 !== undefined)
    r5.push(row('C1 body', cfg.REQUIRE_STRONG_C1 ? 'Must be strong (≥60%)' : 'Normal body accepted'));
  if (cfg.REQUIRE_STRONG_C2 !== undefined)
    r5.push(row('C2 body', cfg.REQUIRE_STRONG_C2 ? 'Must be strong (≥60%)' : 'Normal body accepted'));
  if (cfg.DOJI_MAX_BODY_PCT !== undefined)
    r5.push(row('Doji max body', '≤ ' + (cfg.DOJI_MAX_BODY_PCT * 100) + '% of range'));
  if (cfg.HAMMER_MIN_BODY_PCT !== undefined)
    r5.push(row('Hammer min body', '≥ ' + (cfg.HAMMER_MIN_BODY_PCT * 100) + '% of range'));
  if (cfg.HAMMER_MAX_BODY_PCT !== undefined)
    r5.push(row('Hammer max body', '≤ ' + (cfg.HAMMER_MAX_BODY_PCT * 100) + '% of range'));
  if (cfg.HAMMER_MIN_LOWER_WICK_PCT !== undefined)
    r5.push(row('Hammer lower wick', '≥ ' + (cfg.HAMMER_MIN_LOWER_WICK_PCT * 100) + '% of range'));
  if (cfg.HAMMER_MAX_UPPER_WICK_PCT !== undefined)
    r5.push(row('Hammer upper wick', '≤ ' + (cfg.HAMMER_MAX_UPPER_WICK_PCT * 100) + '% of range'));
  if (cfg.MIN_RANGE_PCT && typeof cfg.MIN_RANGE_PCT === 'object' && !Array.isArray(cfg.MIN_RANGE_PCT)) {
    Object.keys(cfg.MIN_RANGE_PCT).forEach(function(tf) {
      var v = cfg.MIN_RANGE_PCT[tf];
      r5.push(row('Min size (' + tf.replace('minute',' min') + ')', 'Doji ≥ ' + v.doji + '%, Hammer ≥ ' + v.hammer + '%'));
    });
  }
  sections.push(section('Pattern', r5));

  return '<div class="info-grid">' + sections.filter(Boolean).join('') + '</div>';
}
</script>
</body>
