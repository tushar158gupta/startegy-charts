<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backtest Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0b0b0f;color:#ddd;min-height:100vh}

/* ── Home screen ── */
#screen-home{padding:30px}
h1.main{font-size:1.5rem;color:#f0f0f0;margin-bottom:4px}
.sub{color:#555;font-size:.85rem;display:block;margin-top:4px;margin-bottom:28px}

/* Strategy group */
.strat-group{margin-bottom:36px}
.strat-heading{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.strat-heading h2{font-size:1.05rem;font-weight:700;color:#c0c0d0;white-space:nowrap}
.strat-heading::after{content:'';flex:1;height:1px;background:linear-gradient(to right,#2a2a3a,transparent)}
.strat-count{color:#444;font-size:.72rem;white-space:nowrap}

.grid{display:flex;flex-wrap:wrap;gap:14px}
.card{background:#13131f;border:1px solid #222;border-radius:12px;padding:18px 20px;
  cursor:pointer;color:#ddd;user-select:none;width:260px;flex-shrink:0;
  transition:border-color .15s,background .15s,transform .12s}
.card:hover{border-color:#4da6ff;background:#161625;transform:translateY(-2px);box-shadow:0 0 18px rgba(77,166,255,.18),0 4px 24px rgba(0,0,0,.4)}
.chead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cname{font-size:.82rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em}
.vbadge{background:#1a1a3a;border:1px solid #3a3a6a;color:#7a9fff;font-size:.72rem;padding:2px 8px;border-radius:10px}
.cdesc{color:#888;font-size:.77rem;margin-bottom:10px;line-height:1.45}
.cstats{display:flex;gap:16px;margin:10px 0}
.cs{display:flex;flex-direction:column;gap:3px}
.cv{font-size:1.1rem;font-weight:700}
.cl{font-size:.68rem;color:#555}
.cnotes{color:#555;font-size:.72rem;margin-top:8px;padding-top:8px;border-top:1px solid #1a1a2a;line-height:1.4}
.nocharts{color:#888;font-size:.72rem;margin-top:8px;background:#111;border:1px solid #1a1a1a;border-radius:4px;padding:5px 8px;font-family:monospace}

/* ── Detail screen ── */
#screen-detail{display:none;padding:20px 24px 48px;max-width:960px;margin:0 auto}
.back-btn{background:none;border:none;color:#4da6ff;cursor:pointer;font-size:.82rem;
  padding:0;margin-bottom:14px;display:inline-flex;align-items:center;gap:5px}
.back-btn:hover{color:#7abfff;text-decoration:underline;text-shadow:0 0 10px rgba(77,166,255,.5)}
.dcard{background:#13131f;border:1px solid #222;border-radius:14px;padding:20px 24px;margin-bottom:18px}
.dcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.dhead h1{font-size:1.5rem;color:#f0f0f0;font-weight:700;display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;line-height:1.2}
.ddesc{color:#777;margin-top:10px;font-size:.83rem;line-height:1.55}
.dnotes{color:#4da6ff;margin-top:8px;font-size:.79rem;background:#0a1520;border:1px solid #1a3a5a;border-radius:6px;padding:6px 12px;display:inline-block}
.drange{color:#3a3a4a;font-size:.74rem;margin-top:10px;display:flex;align-items:center;gap:5px}
.drange span{color:#4a4a6a}
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sbar{flex:1;min-width:82px;background:#13131f;border:1px solid #1e1e2e;border-radius:10px;padding:16px 10px;text-align:center}
.sbar .sv{font-size:1.6rem;font-weight:700;line-height:1}
.sbar .sl2{font-size:.63rem;color:#3a3a4a;margin-top:6px;text-transform:uppercase;letter-spacing:.07em}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:28px}
.info-section{background:#13131f;border:1px solid #1a1a2a;border-radius:10px;overflow:hidden}
.info-title{background:#0c0c1a;color:#4a6aff;font-size:.65rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;padding:9px 14px;border-bottom:1px solid #1a1a2a}
.info-rows{padding:2px 0}
.info-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 14px;gap:14px;border-bottom:1px solid rgba(255,255,255,.03)}
.info-row:last-child{border-bottom:none}
.info-row:hover{background:rgba(255,255,255,.018)}
.ik{color:#444;font-size:.74rem;white-space:nowrap;flex-shrink:0}
.iv{color:#bbb;font-size:.79rem;text-align:right}
.cta-btn{display:inline-flex;align-items:center;gap:6px;background:#162d52;border:1px solid #1e4080;
  color:#6aafff;padding:10px 20px;border-radius:8px;text-decoration:none;
  font-size:.88rem;font-weight:600;white-space:nowrap;flex-shrink:0;
  transition:background .15s,color .15s,border-color .15s}
.cta-btn:hover{background:#1e4080;color:#fff;border-color:#4da6ff;box-shadow:0 0 20px rgba(77,166,255,.35)}
.cta-btn.disabled{opacity:.3;pointer-events:none;cursor:default}
</style>
</head>
<body>

<!-- ── Home ── -->
<div id="screen-home">
  <h1 class="main">Backtest Dashboard</h1>
  <span class="sub" id="home-sub">Click a strategy version to see details</span>
  <div id="home-groups"></div>
</div>

<!-- ── Detail ── -->
<div id="screen-detail">
  <button class="back-btn" onclick="goHome()">&#8592; Back to Dashboard</button>
  <div class="dcard">
    <div class="dcard-top">
      <div id="d-head" class="dhead"></div>
      <a id="d-cta" class="cta-btn" href="#">View Stocks &#8594;</a>
    </div>
  </div>
  <div id="d-stats" class="stats-bar"></div>
  <div id="d-body"></div>
</div>

// ── Render grouped home screen ────────────────────────────────────────────────
function renderHome() {
  // Group cards by stratLabel
  var groups = {};
  var order  = [];
  CARDS.forEach(function(c, i) {
    if (!groups[c.stratLabel]) { groups[c.stratLabel] = []; order.push(c.stratLabel); }
    groups[c.stratLabel].push({ card: c, idx: i });
  });

  document.getElementById('home-sub').textContent =
    'Click a strategy version to see details · ' + order.length + ' strategies · ' + CARDS.length + ' versions';

  var html = '';
  order.forEach(function(label) {
    var items = groups[label];
    html += '<div class="strat-group">';
    html += '<div class="strat-heading"><h2>' + label + '</h2><span class="strat-count">' + items.length + ' version' + (items.length > 1 ? 's' : '') + '</span></div>';
    html += '<div class="grid">';
    items.forEach(function(item) {
      var c   = item.card;
      var i   = item.idx;
      var wrf = parseFloat(c.wr);
      var wrc = wrf >= 60 ? '#00cc55' : wrf >= 50 ? '#ffc107' : '#ff4444';
      var wrbg= wrf >= 60 ? '#071a0f' : wrf >= 50 ? '#1a1500' : '#1a0707';
      html += '<div class="card" onclick="openCard(' + i + ')">';
      html += '<div class="chead"><span class="cname">version</span><span class="vbadge">' + c.version + '</span></div>';
      html += '<div class="cdesc">' + c.description + '</div>';
      html += '<div class="cstats">';
      html += '<div class="cs"><div class="cv">' + c.total + '</div><div class="cl">Signals</div></div>';
      html += '<div class="cs"><div class="cv">' + c.symCount + '</div><div class="cl">Symbols</div></div>';
      html += '<div class="cs"><div class="cv" style="color:' + wrc + ';background:' + wrbg + ';padding:2px 7px;border-radius:5px">' + c.wr + '%</div><div class="cl">Win Rate</div></div>';
      html += '</div>';
      if (c.notes) html += '<div class="cnotes">' + c.notes + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
  });

  document.getElementById('home-groups').innerHTML = html;
}

function goHome() {
  document.getElementById('screen-detail').style.display = 'none';
  document.getElementById('screen-home').style.display   = '';
  window.scrollTo(0, 0);
}

function openCard(i) {
  const c = CARDS[i];
  document.getElementById('screen-home').style.display   = 'none';
  document.getElementById('screen-detail').style.display = 'block';
  window.scrollTo(0, 0);

  const badge = c.version ? '<span class="vbadge">' + c.version + '</span>' : '';
  document.getElementById('d-head').innerHTML =
    '<h1>' + c.stratLabel + ' ' + badge + '</h1>' +
    (c.description ? '<div class="ddesc">' + c.description + '</div>' : '') +
    (c.notes       ? '<div class="dnotes">' + c.notes + '</div>'       : '') +
    (c.fromDate    ? '<div class="drange"><span>' + c.fromDate + '</span> &rarr; <span>' + c.toDate + '</span></div>' : '');

  const wrf  = parseFloat(c.wr);
  const wrc  = wrf >= 60 ? '#00cc55' : wrf >= 50 ? '#ffc107' : '#ff4444';
  const wrbg = wrf >= 60 ? '#071a0f' : wrf >= 50 ? '#1a1500' : '#1a0707';
  const open = c.total - c.wins - c.sl;
  document.getElementById('d-stats').innerHTML =
    sbar(c.total,   'Signals') +
    sbar(c.symCount,'Symbols') +
    '<div class="sbar"><div class="sv" style="color:' + wrc + ';background:' + wrbg + ';padding:4px 12px;border-radius:7px;font-size:1.4rem">' + c.wr + '%</div><div class="sl2">Win Rate</div></div>' +
    sbar(c.wins, 'Wins',    '#00cc55') +
    sbar(c.sl,   'SL Hits', '#ff4444') +
    (open > 0 ? sbar(open, 'Open', '#888') : '');

  document.getElementById('d-body').innerHTML =
    c.config ? renderConfig(c.config) : '<p style="color:#555;padding:16px 0">No config available</p>';

  const cta = document.getElementById('d-cta');
  if (c.hasCharts) {
    cta.href = c.folder + '/index.html';
    cta.textContent = 'View Stocks →';
    cta.classList.remove('disabled');
  } else {
    cta.href = '#';
    cta.textContent = 'Charts not generated yet';
    cta.classList.add('disabled');
  }
}

function sbar(v, label, col) {
  return '<div class="sbar"><div class="sv"' + (col ? ' style="color:' + col + '"' : '') + '>' + v + '</div><div class="sl2">' + label + '</div></div>';
}
function row(k, v) {
  return '<div class="info-row"><span class="ik">' + k + '</span><span class="iv">' + v + '</span></div>';
}
function section(title, rows) {
  if (!rows.length) return '';
  return '<div class="info-section"><div class="info-title">' + title + '</div><div class="info-rows">' + rows.join('') + '</div></div>';
}

// Boot
renderHome();

function renderConfig(cfg) {
  const sections = [];

  // ── Entry ────────────────────────────────────────────────────────────────────
  const r1 = [];
  if (cfg.TIMEFRAMES && cfg.TIMEFRAMES.length)
    r1.push(row('Timeframes', cfg.TIMEFRAMES.map(function(t){ return t.replace('minute',' min'); }).join(' · ')));
  var mode = 'PENDING + CONFIRMED';
  if (cfg.SKIP_CONFIRMED === true)    mode = 'PENDING only — buy-stop above C3 high';
  else if (cfg.REQUIRE_BULLISH_ENTRY) mode = 'CONFIRMED — entry at open of bullish C3';
  r1.push(row('Signal mode', mode));
  if (cfg.BREAKOUT_BUFFER_PCT !== undefined) r1.push(row('Breakout buffer', cfg.BREAKOUT_BUFFER_PCT + '%'));
  if (cfg.EOD_CUTOFF_HOUR) r1.push(row('EOD cutoff', 'No new signals after ' + cfg.EOD_CUTOFF_HOUR + ':00'));
  sections.push(section('Entry', r1));

  // ── Stop Loss ────────────────────────────────────────────────────────────────
  const r2 = [];
  if (cfg.SL_BUFFER_PCT !== undefined) r2.push(row('SL buffer', cfg.SL_BUFFER_PCT + '% of range below pattern low'));
  if (cfg.MIN_RISK_PCT  !== undefined) r2.push(row('Min risk',  cfg.MIN_RISK_PCT  + '% per trade'));
  if (cfg.MAX_RISK_PCT  !== undefined) r2.push(row('Max risk',  cfg.MAX_RISK_PCT  + '% per trade'));
  sections.push(section('Stop Loss', r2));

  // ── Targets ──────────────────────────────────────────────────────────────────
  const r3 = [];
  if (cfg.T1_RR) r3.push(row('T1', cfg.T1_RR + 'R'));
  if (cfg.T2_RR) r3.push(row('T2', cfg.T2_RR + 'R'));
  if (cfg.T3_RR) r3.push(row('T3', cfg.T3_RR + 'R'));
  if (cfg.TRAILING_ACTIVATION_RR) r3.push(row('Trailing activates', 'after ' + cfg.TRAILING_ACTIVATION_RR + 'R'));
  if (cfg.TRAILING_STOP_PCT)      r3.push(row('Trailing step', cfg.TRAILING_STOP_PCT + '%'));
  if (cfg.PARTIAL_BOOKING_PCT && cfg.PARTIAL_BOOKING_RR)
    r3.push(row('Partial exit', cfg.PARTIAL_BOOKING_PCT + '% of position at ' + cfg.PARTIAL_BOOKING_RR + 'R'));
  if (cfg.MIN_RR_RATIO) r3.push(row('Min R:R to accept trade', cfg.MIN_RR_RATIO + 'R'));
  if (cfg.TRADE_PARAMS) {
    Object.keys(cfg.TRADE_PARAMS).forEach(function(tf) {
      var p   = cfg.TRADE_PARAMS[tf];
      var lbl = tf.replace('minute',' min');
      var tgts = [
        ('t1R' in p) && ('T1=' + p.t1R + 'R'),
        ('t2R' in p) && ('T2=' + p.t2R + 'R'),
        ('t3R' in p) && ('T3=' + p.t3R + 'R'),
      ].filter(Boolean).join(' · ');
      r3.push(row(lbl,
        tgts +
        (p.maxHoldCandles ? ' · max ' + p.maxHoldCandles + ' candles' : '') +
        (p.slBuffer ? ' · SL buf ' + (p.slBuffer * 100) + '%' : '')
      ));
    });
  }
  sections.push(section('Targets', r3));

  // ── Filters ──────────────────────────────────────────────────────────────────
  const r4 = [];
  if (cfg.RSI_MIN !== undefined && cfg.RSI_MAX !== undefined)
    r4.push(row('RSI', cfg.RSI_MIN + ' – ' + cfg.RSI_MAX + ' (period ' + cfg.RSI_PERIOD + ')'));
  if (cfg.ADX_THRESHOLD !== undefined) {
    var adxStr = cfg.ADX_MAX !== undefined
      ? cfg.ADX_THRESHOLD + ' – ' + cfg.ADX_MAX
      : '≥ ' + cfg.ADX_THRESHOLD;
    r4.push(row('ADX', adxStr + ' (period ' + cfg.ADX_PERIOD + ')'));
  }
  if (cfg.ATR_MIN_THRESHOLD_PCT !== undefined) r4.push(row('ATR min', cfg.ATR_MIN_THRESHOLD_PCT + '% of price'));
  if (cfg.SUPPORT_ZONE_PCT !== undefined) r4.push(row('Support zone', '±' + cfg.SUPPORT_ZONE_PCT + '% around swing low'));
  if (cfg.VOLUME_MA_PERIOD !== undefined) r4.push(row('Volume MA', cfg.VOLUME_MA_PERIOD + '-candle average'));
  if (cfg.MIN_VOLUME_MULTIPLE)            r4.push(row('Volume filter', '≥ ' + cfg.MIN_VOLUME_MULTIPLE + '× average'));
  if (cfg.SWING_LOOKBACK !== undefined)   r4.push(row('Swing lookback', cfg.SWING_LOOKBACK + ' candles'));
  if (cfg.TREND_LOOKBACK !== undefined && !cfg.DECLINE_BY_INTERVAL)
    r4.push(row('Trend lookback', cfg.TREND_LOOKBACK + ' candles'));
  if (cfg.DECLINE_BY_INTERVAL) {
    Object.keys(cfg.DECLINE_BY_INTERVAL).forEach(function(tf) {
      r4.push(row(
        'Prior decline (' + tf.replace('minute',' min') + ')',
        '≥ ' + cfg.DECLINE_BY_INTERVAL[tf] + '% over ' + cfg.TREND_LOOKBACK + ' candles'
      ));
    });
  }
  sections.push(section('Filters', r4));

  // ── Pattern ──────────────────────────────────────────────────────────────────
  const r5 = [];
  if (cfg.LOW_TOLERANCE_PCT !== undefined)
    r5.push(row('Low tolerance', cfg.LOW_TOLERANCE_PCT + '% (how equal the two lows must be)'));
  if (cfg.STRONG_BODY_RATIO !== undefined)
    r5.push(row('Strong body', '≥ ' + (cfg.STRONG_BODY_RATIO * 100) + '% of candle range'));
  if (cfg.NORMAL_BODY_MIN_RATIO !== undefined)
    r5.push(row('Normal body min', '≥ ' + (cfg.NORMAL_BODY_MIN_RATIO * 100) + '% of range'));
  if (cfg.MIN_CANDLE_RANGE_PCT !== undefined)
    r5.push(row('Min candle size', cfg.MIN_CANDLE_RANGE_PCT + '% of price'));
  if (cfg.REQUIRE_STRONG_C1 !== undefined)
    r5.push(row('C1 body', cfg.REQUIRE_STRONG_C1 ? 'Must be strong (≥60%)' : 'Normal body accepted'));
  if (cfg.REQUIRE_STRONG_C2 !== undefined)
    r5.push(row('C2 body', cfg.REQUIRE_STRONG_C2 ? 'Must be strong (≥60%)' : 'Normal body accepted'));
  if (cfg.DOJI_MAX_BODY_PCT !== undefined)
    r5.push(row('Doji max body', '≤ ' + (cfg.DOJI_MAX_BODY_PCT * 100) + '% of range'));
  if (cfg.HAMMER_MAX_BODY_PCT !== undefined)
    r5.push(row('Hammer max body', '≤ ' + (cfg.HAMMER_MAX_BODY_PCT * 100) + '% of range'));
  if (cfg.HAMMER_MIN_LOWER_WICK_PCT !== undefined)
    r5.push(row('Hammer lower wick', '≥ ' + (cfg.HAMMER_MIN_LOWER_WICK_PCT * 100) + '% of range'));
  if (cfg.HAMMER_MAX_UPPER_WICK_PCT !== undefined)
    r5.push(row('Hammer upper wick', '≤ ' + (cfg.HAMMER_MAX_UPPER_WICK_PCT * 100) + '% of range'));
  if (cfg.MIN_RANGE_PCT && typeof cfg.MIN_RANGE_PCT === 'object' && !Array.isArray(cfg.MIN_RANGE_PCT)) {
    Object.keys(cfg.MIN_RANGE_PCT).forEach(function(tf) {
      var v = cfg.MIN_RANGE_PCT[tf];
      r5.push(row('Min size (' + tf.replace('minute',' min') + ')', 'Doji ≥ ' + v.doji + '%, Hammer ≥ ' + v.hammer + '%'));
    });
  }
  sections.push(section('Pattern', r5));

  return '<div class="info-grid">' + sections.filter(Boolean).join('') + '</div>';
}
</script>
</body>
</html>
