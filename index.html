<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backtest Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0b0b0f;color:#e0e0e0;min-height:100vh}

/* ── Home ── */
#screen-home{padding:30px}
h1.main{font-size:1.5rem;color:#f5f5f5;margin-bottom:4px}
.sub{color:#aaa;font-size:.85rem;display:block;margin-top:4px;margin-bottom:28px}
.strat-group{margin-bottom:40px}
.strat-heading{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.strat-heading h2{font-size:1.15rem;font-weight:700;color:#e8e8f0;white-space:nowrap}
.strat-heading::after{content:'';flex:1;height:1px;background:linear-gradient(to right,#3a3a4a,transparent)}
.strat-count{color:#888;font-size:.72rem;white-space:nowrap}
.compare-btn{background:#0e1a2e;border:1px solid #2a4a7f;color:#6ab4ff;font-size:.75rem;
  padding:5px 14px;border-radius:6px;cursor:pointer;white-space:nowrap;text-decoration:none;
  display:inline-flex;align-items:center;gap:5px;
  transition:background .15s,border-color .15s,color .15s}
.compare-btn:hover{background:#162d52;border-color:#4da6ff;color:#aad4ff}
.grid{display:flex;flex-wrap:wrap;gap:14px}
.card{background:#13131f;border:1px solid #252530;border-radius:12px;padding:18px 20px;
  cursor:pointer;color:#e0e0e0;user-select:none;width:270px;flex-shrink:0;
  transition:border-color .15s,background .15s,transform .12s}
.card:hover{border-color:#4da6ff;background:#16162a;transform:translateY(-2px);
  box-shadow:0 0 18px rgba(77,166,255,.15),0 4px 24px rgba(0,0,0,.4)}
.card.no-data{opacity:.7;border-style:dashed}
.chead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cname{font-size:.7rem;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.06em}
.vbadge{background:#1a1a3a;border:1px solid #3a3a6a;color:#8ab4ff;font-size:.74rem;padding:2px 9px;border-radius:10px}
.vbadge.latest{background:#0a1f0a;border-color:#2a5a2a;color:#5acc5a}
.cdesc{color:#c8c8c8;font-size:.78rem;margin-bottom:10px;line-height:1.5}
.cstats{display:flex;gap:14px;margin:10px 0}
.cs{display:flex;flex-direction:column;gap:3px}
.cv{font-size:1.1rem;font-weight:700;color:#f0f0f0}
.cl{font-size:.68rem;color:#888}
.cnotes{color:#b0b0b0;font-size:.73rem;margin-top:8px;padding-top:8px;border-top:1px solid #222;line-height:1.45}
.no-stats{color:#888;font-size:.76rem;font-style:italic;padding:8px 0}

/* ── Detail ── */
#screen-detail{display:none;padding:20px 24px 48px;max-width:960px;margin:0 auto}
.back-btn{background:none;border:none;color:#6ab4ff;cursor:pointer;font-size:.84rem;
  padding:0;margin-bottom:14px;display:inline-flex;align-items:center;gap:5px}
.back-btn:hover{color:#aad4ff;text-decoration:underline}
.dcard{background:#13131f;border:1px solid #252530;border-radius:14px;padding:20px 24px;margin-bottom:18px}
.dcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.dhead h1{font-size:1.5rem;color:#f5f5f5;font-weight:700;display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;line-height:1.2}
.ddesc{color:#c8c8c8;margin-top:10px;font-size:.84rem;line-height:1.55}
.dnotes{color:#7ac4ff;margin-top:8px;font-size:.8rem;background:#0a1520;border:1px solid #1a3a5a;border-radius:6px;padding:6px 12px;display:inline-block}
.drange{color:#999;font-size:.75rem;margin-top:10px;display:flex;align-items:center;gap:5px}
.drange span{color:#bbb}
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sbar{flex:1;min-width:82px;background:#13131f;border:1px solid #222;border-radius:10px;padding:16px 10px;text-align:center}
.sbar .sv{font-size:1.6rem;font-weight:700;line-height:1;color:#f0f0f0}
.sbar .sl2{font-size:.63rem;color:#888;margin-top:6px;text-transform:uppercase;letter-spacing:.07em}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:28px}
.info-section{background:#13131f;border:1px solid #1e1e2e;border-radius:10px;overflow:hidden}
.info-title{background:#0c0c1a;color:#7a9aff;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 14px;border-bottom:1px solid #1e1e2e}
.info-rows{padding:2px 0}
.info-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 14px;gap:14px;border-bottom:1px solid rgba(255,255,255,.04)}
.info-row:last-child{border-bottom:none}
.info-row:hover{background:rgba(255,255,255,.025)}
.ik{color:#bbb;font-size:.75rem;white-space:nowrap;flex-shrink:0}
.iv{color:#e8e8e8;font-size:.8rem;text-align:right}
.cta-btn{display:inline-flex;align-items:center;gap:6px;background:#162d52;border:1px solid #2a4a80;
  color:#7abfff;padding:10px 20px;border-radius:8px;text-decoration:none;
  font-size:.88rem;font-weight:600;white-space:nowrap;flex-shrink:0;
  transition:background .15s,color .15s,border-color .15s}
.cta-btn:hover{background:#1e4080;color:#fff;border-color:#4da6ff;box-shadow:0 0 20px rgba(77,166,255,.3)}
.cta-btn.disabled{opacity:.3;pointer-events:none;cursor:default}
</style>
</head>

function renderHome(){
  var groups={},order=[];
  CARDS.forEach(function(c,i){if(!groups[c.stratLabel]){groups[c.stratLabel]=[];order.push(c.stratLabel);}groups[c.stratLabel].push({card:c,idx:i});});
  document.getElementById('home-sub').textContent=order.length+' strategies \xb7 '+CARDS.length+' versions \xb7 click a card to see full config';
  var html='';
  order.forEach(function(label){
    var items=groups[label];
    html+='<div class="strat-group">';
    html+='<div class="strat-heading"><h2>'+label+'</h2><span class="strat-count">'+items.length+' version'+(items.length>1?'s':'')+'</span>';
    if(items.length>1) html+='<a href="compare.html?s='+encodeURIComponent(label)+'" class="compare-btn">⇄ Compare versions</a>';
    html+='</div><div class="grid">';
    items.forEach(function(item){
      var c=item.card,i=item.idx,isLatest=(item===items[items.length-1]);
      var wrf=parseFloat(c.wr),wrc=wrf>=60?'#22cc66':wrf>=50?'#ffc107':'#ff5555',wrbg=wrf>=60?'#071a0f':wrf>=50?'#1a1500':'#1a0707';
      html+='<div class="card'+(c.total==null?' no-data':'')+'" onclick="openCard('+i+')">';
      html+='<div class="chead"><span class="cname">version</span><span class="vbadge'+(isLatest?' latest':'')+'">'+c.version+(isLatest?' ★':' ')+'</span></div>';
      html+='<div class="cdesc">'+c.description+'</div>';
      if(c.total!=null){
        html+='<div class="cstats"><div class="cs"><div class="cv">'+c.total+'</div><div class="cl">Signals</div></div><div class="cs"><div class="cv">'+c.symCount+'</div><div class="cl">Symbols</div></div><div class="cs"><div class="cv" style="color:'+wrc+';background:'+wrbg+';padding:2px 8px;border-radius:5px">'+c.wr+'%</div><div class="cl">Win Rate</div></div></div>';
      } else {
        html+='<div class="no-stats">Backtest not run yet</div>';
      }
      if(c.notes) html+='<div class="cnotes">'+c.notes+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('home-groups').innerHTML=html;
}

function goHome(){
  document.getElementById('screen-detail').style.display='none';
  document.getElementById('screen-home').style.display='';
  window.scrollTo(0,0);
}

function openCard(i){
  var c=CARDS[i];
  document.getElementById('screen-home').style.display='none';
  document.getElementById('screen-detail').style.display='block';
  window.scrollTo(0,0);
  var badge=c.version?'<span class="vbadge">'+c.version+'</span>':'';
  document.getElementById('d-head').innerHTML='<h1>'+c.stratLabel+' '+badge+'</h1>'+(c.description?'<div class="ddesc">'+c.description+'</div>':'')+(c.notes?'<div class="dnotes">'+c.notes+'</div>':'')+(c.fromDate?'<div class="drange"><span>'+c.fromDate+'</span> → <span>'+c.toDate+'</span></div>':'');
  if(c.total!=null){
    var wrf=parseFloat(c.wr),wrc=wrf>=60?'#22cc66':wrf>=50?'#ffc107':'#ff5555',wrbg=wrf>=60?'#071a0f':wrf>=50?'#1a1500':'#1a0707';
    var open=c.total-c.wins-c.sl;
    document.getElementById('d-stats').innerHTML=sb(c.total,'Signals')+sb(c.symCount,'Symbols')+'<div class="sbar"><div class="sv" style="color:'+wrc+';background:'+wrbg+';padding:4px 12px;border-radius:7px;font-size:1.4rem">'+c.wr+'%</div><div class="sl2">Win Rate</div></div>'+sb(c.wins,'Wins','#22cc66')+sb(c.sl,'SL Hits','#ff5555')+(open>0?sb(open,'Open','#aaa'):'');
  } else {
    document.getElementById('d-stats').innerHTML='<div style="color:#888;font-size:.88rem;padding:14px 0">No backtest results yet for this version.</div>';
  }
  document.getElementById('d-body').innerHTML=c.config?renderConfig(c.config):'';
  var cta=document.getElementById('d-cta');
  if(c.hasCharts){cta.href=c.folder+'/index.html';cta.textContent='View Stocks →';cta.classList.remove('disabled');}
  else{cta.href='#';cta.textContent='Charts not generated yet';cta.classList.add('disabled');}
}

function sb(v,label,col){return '<div class="sbar"><div class="sv"'+(col?' style="color:'+col+'"':'')+'>'+v+'</div><div class="sl2">'+label+'</div></div>';}
function row(k,v){return '<div class="info-row"><span class="ik">'+k+'</span><span class="iv">'+v+'</span></div>';}
function sec(title,rows){if(!rows.length)return '';return '<div class="info-section"><div class="info-title">'+title+'</div><div class="info-rows">'+rows.join('')+'</div></div>';}

function renderConfig(cfg){
  var s=[];
  var r=[];
  if(cfg.TIMEFRAMES) r.push(row('Timeframes',cfg.TIMEFRAMES.map(function(t){return t.replace('minute',' min');}).join(' \xb7 ')));
  r.push(row('Signal mode',cfg.SKIP_CONFIRMED?'PENDING — buy-stop above pattern high':cfg.REQUIRE_BULLISH_ENTRY?'CONFIRMED — entry at open of bullish C3':'PENDING + CONFIRMED'));
  if(cfg.BREAKOUT_BUFFER_PCT!==undefined) r.push(row('Breakout buffer',cfg.BREAKOUT_BUFFER_PCT+'%'));
  if(cfg.EOD_CUTOFF_HOUR) r.push(row('EOD cutoff','No new signals after '+cfg.EOD_CUTOFF_HOUR+':00 IST'));
  s.push(sec('Entry',r));

  r=[];
  if(cfg.SL_BUFFER_PCT!==undefined) r.push(row('SL buffer',cfg.SL_BUFFER_PCT+'% below pattern low'));
  if(cfg.MIN_RISK_PCT!==undefined) r.push(row('Min risk per trade',cfg.MIN_RISK_PCT+'%'));
  if(cfg.MAX_RISK_PCT!==undefined) r.push(row('Max risk per trade',cfg.MAX_RISK_PCT+'%'));
  s.push(sec('Risk',r));

  r=[];
  if(cfg.T1_RR) r.push(row('T1',cfg.T1_RR+'R'));
  if(cfg.T2_RR) r.push(row('T2',cfg.T2_RR+'R'));
  if(cfg.T3_RR) r.push(row('T3',cfg.T3_RR+'R'));
  if(cfg.TRAILING_ACTIVATION_RR) r.push(row('Trailing activates','after '+cfg.TRAILING_ACTIVATION_RR+'R'));
  if(cfg.TRAILING_STOP_PCT) r.push(row('Trailing step',cfg.TRAILING_STOP_PCT+'%'));
  if(cfg.PARTIAL_BOOKING_PCT&&cfg.PARTIAL_BOOKING_RR) r.push(row('Partial exit',cfg.PARTIAL_BOOKING_PCT+'% at '+cfg.PARTIAL_BOOKING_RR+'R'));
  if(cfg.MIN_RR_RATIO) r.push(row('Min R:R required',cfg.MIN_RR_RATIO+'R'));
  if(cfg.TRADE_PARAMS){Object.keys(cfg.TRADE_PARAMS).forEach(function(tf){var p=cfg.TRADE_PARAMS[tf],lbl=tf.replace('minute',' min'),t=[p.t1R&&'T1='+p.t1R+'R',p.t2R&&'T2='+p.t2R+'R',p.t3R&&'T3='+p.t3R+'R'].filter(Boolean).join(' \xb7 ');r.push(row(lbl,t+(p.maxHoldCandles?' \xb7 max '+p.maxHoldCandles+' candles':'')));});}
  s.push(sec('Targets',r));

  r=[];
  if(cfg.REQUIRE_EMA_TREND_FILTER) r.push(row('Trend (EMA)','EMA'+cfg.EMA_SHORT+' declining AND EMA'+cfg.EMA_SHORT+' < EMA'+cfg.EMA_LONG+' (lookback '+cfg.EMA_DECLINE_LOOKBACK+')'));
  if(cfg.EMA_SHORT&&!cfg.REQUIRE_EMA_TREND_FILTER) r.push(row('Trend (EMA)','EMA'+cfg.EMA_SHORT+' < EMA'+cfg.EMA_LONG+' + declining (lookback '+cfg.EMA_DECLINE_LOOKBACK+')'));
  if(cfg.DECLINE_BY_INTERVAL&&!cfg.EMA_SHORT){Object.keys(cfg.DECLINE_BY_INTERVAL).forEach(function(tf){r.push(row('Prior decline ('+tf.replace('minute',' min')+')','>='+cfg.DECLINE_BY_INTERVAL[tf]+'% over '+cfg.TREND_LOOKBACK+' candles'));});}
  if(cfg.REQUIRE_RSI_FILTER!==undefined) r.push(row('RSI',(cfg.REQUIRE_RSI_FILTER?'':'[off] ')+cfg.RSI_MIN+' – '+cfg.RSI_MAX+' (period '+cfg.RSI_PERIOD+')'));
  else if(cfg.RSI_MIN!==undefined) r.push(row('RSI',cfg.RSI_MIN+' – '+cfg.RSI_MAX+' (period '+cfg.RSI_PERIOD+')'));
  if(cfg.REQUIRE_ADX_FILTER!==undefined){var as=(cfg.ADX_MIN!==undefined?cfg.ADX_MIN+' – '+cfg.ADX_MAX:cfg.ADX_THRESHOLD+' – '+cfg.ADX_MAX);r.push(row('ADX',(cfg.REQUIRE_ADX_FILTER?'':'[off] ')+as+(cfg.REQUIRE_ADX_RISING?' \xb7 must be rising':'')+' (period '+cfg.ADX_PERIOD+')'));}
  else if(cfg.ADX_THRESHOLD!==undefined){var as2=(cfg.ADX_MAX!==undefined?cfg.ADX_THRESHOLD+' – '+cfg.ADX_MAX:'>= '+cfg.ADX_THRESHOLD);r.push(row('ADX',as2+(cfg.REQUIRE_ADX_RISING?' \xb7 must be rising':'')+' (period '+cfg.ADX_PERIOD+')'));}
  if(cfg.ATR_MIN_THRESHOLD_PCT!==undefined) r.push(row('ATR min',cfg.ATR_MIN_THRESHOLD_PCT+'% of price'));
  if(cfg.REQUIRE_SUPPORT_FILTER) r.push(row('Support','Low within '+(cfg.SUPPORT_PROXIMITY_PCT*100)+'% of swing low (lookback '+cfg.SWING_LOOKBACK+')'));
  else if(cfg.SUPPORT_ZONE_PCT!==undefined) r.push(row('Support zone','\xb1'+cfg.SUPPORT_ZONE_PCT+'% of swing low (lookback '+cfg.SWING_LOOKBACK+')'));
  if(cfg.MIN_VOLUME_MULTIPLE) r.push(row('Volume','>='+cfg.MIN_VOLUME_MULTIPLE+'x '+cfg.VOLUME_LOOKBACK+'-candle avg'));
  else if(cfg.VOLUME_MA_PERIOD) r.push(row('Volume MA',cfg.VOLUME_MA_PERIOD+'-candle avg (no threshold)'));
  s.push(sec('Filters',r));

  r=[];
  if(cfg.LOW_TOLERANCE_PCT!==undefined) r.push(row('Equal-low tolerance',cfg.LOW_TOLERANCE_PCT+'%'));
  if(cfg.STRONG_BODY_RATIO!==undefined) r.push(row('Strong body','>='+(cfg.STRONG_BODY_RATIO*100)+'% of range'));
  if(cfg.REQUIRE_STRONG_C1!==undefined) r.push(row('C1 body',cfg.REQUIRE_STRONG_C1?'Strong >=60%':'Normal accepted'));
  if(cfg.REQUIRE_STRONG_C2!==undefined) r.push(row('C2 body',cfg.REQUIRE_STRONG_C2?'Strong >=60%':'Normal accepted'));
  if(cfg.DOJI_MAX_BODY_PCT!==undefined) r.push(row('Doji max body','<='+(cfg.DOJI_MAX_BODY_PCT*100)+'% of range'));
  if(cfg.HAMMER_MIN_LOWER_WICK_PCT!==undefined) r.push(row('Hammer lower wick','>='+(cfg.HAMMER_MIN_LOWER_WICK_PCT*100)+'% of range'));
  if(cfg.HAMMER_MAX_UPPER_WICK_PCT!==undefined) r.push(row('Hammer upper wick','<='+(cfg.HAMMER_MAX_UPPER_WICK_PCT*100)+'% of range'));
  if(cfg.MIN_RANGE_PCT&&typeof cfg.MIN_RANGE_PCT==='object'){Object.keys(cfg.MIN_RANGE_PCT).forEach(function(tf){var v=cfg.MIN_RANGE_PCT[tf];r.push(row('Min size ('+tf.replace('minute',' min')+')','Doji >='+v.doji+'%, Hammer >='+v.hammer+'%'));});}
  if(cfg.MIN_CANDLE_RANGE_PCT!==undefined) r.push(row('Min candle size',cfg.MIN_CANDLE_RANGE_PCT+'% of price'));
  s.push(sec('Pattern',r));

  return '<div class="info-grid">'+s.filter(Boolean).join('')+'</div>';
}

renderHome();
</script>
