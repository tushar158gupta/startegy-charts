<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compare Versions</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0b0b0f;color:#e0e0e0;min-height:100vh;padding:28px 24px 60px}
a{color:#6ab4ff;text-decoration:none}
a:hover{color:#aad4ff;text-decoration:underline}

.back{display:inline-flex;align-items:center;gap:6px;font-size:.84rem;margin-bottom:22px;color:#6ab4ff}
.back:hover{color:#aad4ff}
.page-title{font-size:1.5rem;font-weight:700;color:#f5f5f5;margin-bottom:4px}
.page-sub{font-size:.82rem;color:#999;margin-bottom:28px}

/* Legend */
.legend{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:22px;padding:12px 16px;
  background:#0e0e18;border:1px solid #252530;border-radius:8px}
.leg{display:flex;align-items:center;gap:7px;font-size:.78rem;color:#bbb}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* Section header */
.section-hdr{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:#7a9aff;padding:16px 0 6px;border-bottom:1px solid #1e1e28;margin-bottom:0}
.section-hdr:first-child{padding-top:0}

/* Table */
.cmp-wrap{overflow-x:auto;margin-bottom:28px}
table{width:100%;border-collapse:collapse;font-size:.82rem;min-width:500px}
thead th{background:#0c0c1a;padding:10px 14px;text-align:left;font-size:.67rem;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid #252535;white-space:nowrap}
thead th.param{color:#888;min-width:200px}
thead th.vcol{text-align:center;color:#8ab4ff;min-width:160px;line-height:1.8;padding:12px 14px}
tbody tr:hover td{background:rgba(255,255,255,.025)}
td{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.045);vertical-align:top}
td.param{color:#ccc;font-size:.76rem;white-space:nowrap}
td.val{text-align:center;font-size:.78rem;line-height:1.5;padding:7px 10px;word-break:break-word;max-width:200px}
td.val.same{color:#555565}
td.val.changed{background:#2d2200;color:#f0d060;font-weight:600;border-radius:4px}
td.val.isnew{background:#0a2810;color:#44dd66;font-weight:600;border-radius:4px}
td.val.removed{background:#280808;color:#dd5555;text-decoration:line-through;border-radius:4px}
tr.grp-row td{background:#0a0a14;color:#7a9aff;font-size:.63rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:9px 14px;border-bottom:1px solid #1a1a28}
tr.stats-row td{background:#0e0e1c;border-bottom:2px solid #2a2a3a;vertical-align:top}

/* Common section card */
.common-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.common-card{background:#0e0e18;border:1px solid #1e1e2e;border-radius:8px;padding:0;overflow:hidden}
.common-card-title{background:#0a0a12;color:#7a9aff;font-size:.62rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:8px 12px;border-bottom:1px solid #1a1a28}
.common-row{display:flex;justify-content:space-between;gap:12px;padding:6px 12px;
  border-bottom:1px solid rgba(255,255,255,.04);font-size:.76rem}
.common-row:last-child{border-bottom:none}
.ck{color:#bbb}
.cv{color:#e8e8e8;text-align:right}
</style>
</head>
<body>

<a class="back" href="index.html">&#8592; Back to Dashboard</a>
<div class="page-title" id="page-title">Compare Versions</div>
<div class="page-sub" id="page-sub"></div>

<div class="legend">
  <div class="leg"><div class="dot" style="background:#f0c040"></div> Changed from previous version</div>
  <div class="leg"><div class="dot" style="background:#44cc66"></div> Newly added (not in previous)</div>
  <div class="leg"><div class="dot" style="background:#cc5555"></div> Removed</div>
  <div class="leg"><div class="dot" style="background:#505060"></div> Same as previous (greyed out)</div>
</div>

<div id="cmp-changed"></div>

<div class="section-hdr" id="common-hdr" style="margin-bottom:14px"></div>

  {name:'Support & Volume', keys:['REQUIRE_SUPPORT_FILTER','SUPPORT_PROXIMITY_PCT','SUPPORT_ZONE_PCT','SWING_LOOKBACK','MIN_VOLUME_MULTIPLE','VOLUME_LOOKBACK','VOLUME_MA_PERIOD','ATR_PERIOD','ATR_MIN_THRESHOLD_PCT']},

function vStr(v){
  if(v===undefined||v===null) return '—';
  if(typeof v==='boolean') return v?'yes':'no';
  if(Array.isArray(v)) return v.map(function(x){return typeof x==='string'?x.replace('minute',' min'):x;}).join(', ');
  if(typeof v==='object'){
    return Object.keys(v).map(function(k){
      var val=v[k];
      var kl=typeof k==='string'?k.replace('minute',' min'):k;
      if(typeof val==='object'){
        var inner=Object.keys(val).map(function(ik){return ik+':'+val[ik];}).join(', ');
        return '<span style="display:block;word-break:break-word;font-size:.75rem"><b>'+kl+'</b> — '+inner+'</span>';
      }
      return '<span style="display:block"><b>'+kl+'</b>: '+val+'</span>';
    }).join('');
  }
  return String(v);
}

function cellCls(k, vi, versions){
  if(vi===0) return 'val same';
  var cur  = versions[vi].config  ? versions[vi].config[k]    : undefined;
  var prev = versions[vi-1].config? versions[vi-1].config[k]  : undefined;
  if(cur===undefined && prev!==undefined) return 'val removed';
  if(cur!==undefined && prev===undefined) return 'val isnew';
  if(JSON.stringify(cur)!==JSON.stringify(prev)) return 'val changed';
  return 'val same';
}

function render(label){
  var versions = CARDS.filter(function(c){return c.stratLabel===label;});
  if(!versions.length){ document.getElementById('cmp-changed').innerHTML='<p style="color:#888;padding:20px 0">Strategy not found.</p>'; return; }

  document.getElementById('page-title').textContent = label + ' — Version Comparison';

  // Version sub line
  var subParts = versions.map(function(v){
    var s=v.version;
    if(v.wr) s+=' ('+v.wr+'% WR)';
    else s+=' (no backtest)';
    return s;
  });
  document.getElementById('page-sub').textContent = subParts.join('  →  ');

  // Collect all keys
  var allKeys=[], keySet={};
  versions.forEach(function(v){if(!v.config)return; Object.keys(v.config).forEach(function(k){if(!keySet[k]){keySet[k]=true;allKeys.push(k);}});});

  var changedKeys=[], commonKeys=[];
  allKeys.forEach(function(k){
    var vals=versions.map(function(v){return JSON.stringify(v.config?v.config[k]:undefined);});
    if(vals.every(function(v){return v===vals[0];})) commonKeys.push(k);
    else changedKeys.push(k);
  });

  // Build covered set from group order
  var coveredKeys={};
  GROUPS.forEach(function(g){g.keys.forEach(function(k){coveredKeys[k]=true;});});
  var otherChanged=changedKeys.filter(function(k){return !coveredKeys[k];});
  if(otherChanged.length) GROUPS.push({name:'Other',keys:otherChanged});

  // Simple column header — just version names
  var vHead='<th class="param">Parameter</th>'+versions.map(function(v){
    return '<th class="vcol">'+v.version+'</th>';
  }).join('');

  // Stats summary row (first tbody row, before any groups)
  var statsRow='<tr class="stats-row"><td class="param" style="color:#888;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em">Backtest results</td>';
  versions.forEach(function(v){
    if(v.total==null){
      statsRow+='<td class="val" style="color:#555;font-size:.74rem;font-style:italic">no backtest</td>';
    } else {
      var wrf=parseFloat(v.wr),wrc=wrf>=60?'#22cc66':wrf>=50?'#ffc107':'#ff5555',wrbg=wrf>=60?'#071a0f':wrf>=50?'#1a1500':'#1a0707';
      var open=v.total-v.wins-v.sl;
      statsRow+='<td class="val" style="padding:10px 14px;white-space:nowrap;text-align:left">'+
        '<span style="background:'+wrbg+';color:'+wrc+';font-size:.82rem;font-weight:700;padding:2px 8px;border-radius:4px">'+v.wr+'%</span>'+
        '<span style="color:#555"> &middot; </span><span style="color:#ccc;font-size:.78rem">'+v.total+' trades</span>'+
        '<span style="color:#555"> &middot; </span><span style="color:#22cc66;font-size:.78rem">'+v.wins+' targets</span>'+
        '<span style="color:#555"> &middot; </span><span style="color:#ff5555;font-size:.78rem">'+v.sl+' SL</span>'+
        (open>0?'<span style="color:#555"> &middot; </span><span style="color:#888;font-size:.78rem">'+open+' open</span>':'')+
        '</td>';
    }
  });
  statsRow+='</tr>';

  // Changed table rows
  var html='';
  var hasAnyChanged=false;
  GROUPS.forEach(function(g){
    var gKeys=g.keys.filter(function(k){return changedKeys.indexOf(k)!==-1;});
    if(!gKeys.length) return;
    hasAnyChanged=true;
    html+='<tr class="grp-row"><td colspan="'+(versions.length+1)+'">'+g.name+'</td></tr>';
    gKeys.forEach(function(k){
      html+='<tr><td class="param">'+k+'</td>';
      versions.forEach(function(v,vi){
        html+='<td class="'+cellCls(k,vi,versions)+'">'+vStr(v.config?v.config[k]:undefined)+'</td>';
      });
      html+='</tr>';
    });
  });

  if(hasAnyChanged){
    document.getElementById('cmp-changed').innerHTML=
      '<div class="section-hdr" style="margin-bottom:10px">What changed across versions</div>'+
      '<div class="cmp-wrap"><table><thead><tr>'+vHead+'</tr></thead><tbody>'+statsRow+html+'</tbody></table></div>';
  } else {
    document.getElementById('cmp-changed').innerHTML='<p style="color:#888;font-size:.85rem;padding:12px 0">No differences found — all versions have identical config.</p>';
  }

  // Common section — grouped into cards
  if(commonKeys.length){
    document.getElementById('common-hdr').textContent='Identical across all '+versions.length+' versions';
    // Group common keys by category
    var commonGrouped={}, ungrouped=[];
    commonKeys.forEach(function(k){
      var found=false;
      GROUPS.forEach(function(g){if(g.keys.indexOf(k)!==-1){if(!commonGrouped[g.name])commonGrouped[g.name]=[];commonGrouped[g.name].push(k);found=true;}});
      if(!found) ungrouped.push(k);
    });
    if(ungrouped.length){if(!commonGrouped['Other'])commonGrouped['Other']=[];commonGrouped['Other']=commonGrouped['Other'].concat(ungrouped);}

    var v0=versions[0];
    var cHtml='<div class="common-grid">';
    Object.keys(commonGrouped).forEach(function(gName){
      var ks=commonGrouped[gName];
      cHtml+='<div class="common-card"><div class="common-card-title">'+gName+'</div>';
      ks.forEach(function(k){
        cHtml+='<div class="common-row"><span class="ck">'+k+'</span><span class="cv">'+vStr(v0.config?v0.config[k]:undefined)+'</span></div>';
      });
      cHtml+='</div>';
    });
    cHtml+='</div>';
    document.getElementById('cmp-common').innerHTML=cHtml;
  } else {
    document.getElementById('common-hdr').textContent='';
  }
}

// Read ?s= from URL
var qs=new URLSearchParams(window.location.search);
var strat=qs.get('s')||'';
if(strat) render(strat);
else document.getElementById('cmp-changed').innerHTML='<p style="color:#888;padding:20px 0">No strategy specified in URL. Go back and click "Compare versions".</p>';
</script>
